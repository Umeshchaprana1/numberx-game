<!DOCTYPE html>
<html>
<head>
  <title>NumberX Game</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }
    .box {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      width: 80%;
      border-radius: 5px;
      border: none;
    }
    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🎮 NumberX Game</h1>

<div class="box">
  <h3>👤 Login</h3>
  <input type="text" id="username" placeholder="Enter Name">
  <input type="text" id="ref" placeholder="Referral Code (optional)">
  <button onclick="login()">Start</button>
</div>

<div class="box" id="game" style="display:none;">
  <h3>💰 Coins: <span id="coins">100</span></h3>

  <input type="number" id="number" placeholder="Enter 1-100">

  <button onclick="play()">Play</button>

  <h3 id="result"></h3>

  <h4>Your Referral Code: <span id="myref"></span></h4>
</div>

<script>
let coins = 100;
let myRef = "REF" + Math.floor(Math.random()*10000);

function login(){
  let name = document.getElementById("username").value;
  if(name == ""){
    alert("Enter name");
    return;
  }

  document.querySelector(".box").style.display = "none";
  document.getElementById("game").style.display = "block";
  document.getElementById("myref").innerText = myRef;

  let ref = document.getElementById("ref").value;
  if(ref !== ""){
    coins += 50; // referral bonus
  }
}

function play(){
  let userNum = document.getElementById("number").value;

  if(userNum < 1 || userNum > 100){
    alert("Enter number 1-100");
    return;
  }

  let systemNum = Math.floor(Math.random()*100)+1;

  let diff = Math.abs(userNum - systemNum);

  if(diff == 0){
    coins += 100;
    result.innerText = "🎯 Exact Match! You Win 100 Coins!";
  }
  else if(diff <= 3){
    coins += 50;
    result.innerText = "🔥 Close! You Win 50 Coins!";
  }
  else{
    coins -= 10;
    result.innerText = "❌ Lost! Try Again";
  }

  document.getElementById("coins").innerText = coins;
}
</script>

</body>
</html>
